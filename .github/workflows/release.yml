name: Release

on:
  release:
    types: [created]

jobs:
  publish-package:
    name: Publish package
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_COLOR: true
      HUSKY_SKIP_INSTALL: 1
      HUSKY_SKIP_HOOKS: 1
      HUSKY: 0
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Pin to 22.22.1 due to npm self-upgrade regression in 22.22.2
          # https://github.com/nodejs/node/issues/62425
          node-version: 22.22.1
          registry-url: https://registry.npmjs.org

      # TODO: Remove once we upgrade to Node 24 (which bundles npm 11)
      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Extract tag version
        id: extract-tag-version
        run: |
          TAG="${GITHUB_REF:10}"
          TAG_VERSION="${TAG//v/}"
          echo "TAG_VERSION=$TAG_VERSION" >> $GITHUB_ENV

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Publish
        run: |
          npm version --no-commit-hooks --no-git-tag-version ${{ env.TAG_VERSION }} && \
          npm publish --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

