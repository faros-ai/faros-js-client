name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_COLOR: true
      HUSKY_SKIP_INSTALL: 1
      HUSKY_SKIP_HOOKS: 1
      HUSKY: 0
    steps:
      - name: Check out
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Pin to 22.22.1 due to npm self-upgrade regression in 22.22.2
          # https://github.com/nodejs/node/issues/62425
          node-version: 22.22.1
      # TODO: Remove once we upgrade to Node 24 (which bundles npm 11)
      - name: Upgrade npm
        run: npm install -g npm@11
      - name: Build
        run: npm ci --unsafe-perm
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test -- --coverage

